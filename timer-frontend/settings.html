<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Pro — Configurações</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="settings.css">
</head>

<body>

    <div class="bg-wrap"></div>

    <div class="page">

        <!-- Cabeçalho -->
        <header class="page-header">
            <button class="back-btn" onclick="window.location.href='index.html'">← Voltar</button>
            <div class="page-title">⚙ Configurações</div>
            <div></div>
        </header>

        <!-- Card principal -->
        <div class="settings-card">

            <!-- Info do usuário -->
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div>
                    <div class="user-name" id="userName">—</div>
                    <div class="user-email" id="userEmail">—</div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Preferência da aba Aula -->
            <div class="section-title">Modo da aba "Início da Aula"</div>

            <div class="pref-options">

                <div class="pref-card" id="prefCron" onclick="selectPref('cronometro')">
                    <div class="pref-card-title">⏱ Com Cronômetro</div>
                    <div class="pref-card-desc">Exibe as imagens padrão em slideshow com o cronômetro visível.</div>
                </div>

                <div class="pref-card" id="prefCustom" onclick="selectPref('personalizado')">
                    <div class="pref-card-title">🖼 Fundo Personalizado</div>
                    <div class="pref-card-desc">Exibe sua própria imagem como fundo, sem cronômetro.</div>
                </div>

            </div>

            <!-- Upload (aparece só no modo personalizado) -->
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('uploadInput').click()">
                <input type="file" id="uploadInput" accept="image/*,.gif" onchange="previewImage(event)">
                <div class="upload-icon">🖼</div>
                <div class="upload-label">Clique para escolher nova imagem</div>
                <div class="upload-hint">PNG, JPG ou GIF · máx. 10MB</div>
                <img id="uploadPreview" class="upload-preview" alt="Prévia">
            </div>

            <!-- Imagem atual -->
            <div class="current-image-wrap" id="currentImageWrap" style="display:none">
                <div class="current-image-label">Imagem atual:</div>
                <img id="currentImage" class="current-image" alt="Imagem atual">
                <button class="btn-danger-small" onclick="removeImage()">✕ Remover imagem</button>
            </div>

            <p class="error-msg" id="settingsError"></p>
            <p class="success-msg" id="settingsSuccess"></p>

            <button class="btn-primary" onclick="saveSettings()">✔ SALVAR</button>

            <div class="divider"></div>

            <button class="btn-logout" onclick="doLogout()">Sair da conta</button>

        </div>
    </div>

    <script src="settings.js"></script>
</body>

</html>
